name: CI (tests on PRs)

# Pull requests never ran any checks before — the test suites only ran inside the
# deploy workflow on push to main, so a bad PR (incl. an automated dependency bump)
# could only be caught after merge. This gates every PR with the same offline checks
# the deploy uses (pyflakes + render smoke) plus the hand-computed value suites, so a
# Dependabot bump (Gap E) must pass them before it can merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pyflakes
          python -m pip install --quiet -r requirements.txt

      - name: pyflakes — undefined names crash pages at render time
        run: |
          python -m pyflakes app.py ui/ data/ analysis/ jobs/ utils/ \
            | grep -v "imported but unused\|redefinition of unused\|unable to detect undefined names" \
            | tee /tmp/pyflakes.txt || true
          if grep -q "undefined name" /tmp/pyflakes.txt; then
            echo "::error::pyflakes found undefined names — would crash at render time"
            exit 1
          fi

      - name: Render smoke (Home sections with populated fake data)
        run: python tests/test_render_smoke.py

      - name: Hand-computed value + extractor suites (offline)
        run: |
          python -m unittest \
            tests.test_audit_regressions \
            tests.test_dcf_and_models \
            tests.test_sec_filing_scraper \
            tests.test_nav_renders \
            tests.test_deploy_secret_contract
          PYTHONIOENCODING=utf-8 python tests/test_metric_formulas.py
