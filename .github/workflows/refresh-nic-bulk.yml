name: Refresh NIC bulk mirror

# Mirrors everything the app needs from NPW (ffiec.gov/npw) into GCS so
# production never has to reach NPW:
#   1. the two NIC bulk zips (nic_bulk/ — Corporate Structure sub-tab)
#   2. the latest filed quarter of FR Y-9C facsimile PDFs (y9c/ — Recent
#      Documents → Regulatory Filings "Download via dashboard")
#
# DISPATCH-ONLY, NOT SCHEDULED — and the fetch steps below FAIL from GitHub.
# NPW's Cloudflare bot management 403s Cloud Run egress AND GitHub-hosted
# runner egress outright (curl included), proven 2026-07-14: prod logs +
# this workflow's own run 29357551545 (every fetch 403'd, first request from
# a fresh runner IP). So there is NO source of unblocked egress in CI, and a
# scheduled run would only spam red failures. The mirror is instead refreshed
# MANUALLY from an unblocked machine (the dev box) — see the runbook in
# docs/DATA-SOURCING-ARCHITECTURE.md ("NIC / FR Y-9C mirror refresh"):
#
#     gcloud.cmd auth application-default login   # once per ADC expiry
#     $env:GCS_BUCKET='ksk-bank-dashboard-data'
#     python -m tools.refresh_nic_bulk            # bulk zips
#     python -m tools.refresh_y9c_mirror          # Y-9C facsimiles
#
# nic_client / fetch_y9c_pdf serve the stale mirror until then, so a late
# refresh degrades gracefully (never an outage). This workflow is kept as a
# manual trigger purely so that IF Cloudflare ever unblocks GitHub egress,
# restoring automation is a one-line `schedule:` re-add — until then, expect
# a dispatch to fail at the first NPW fetch.
#
# verify_only=true SKIPS the (blocked) NPW fetches and runs ONLY the Cloud Run
# fresh-instance verification. That step touches only GCS + Cloud Run (never
# NPW) and authenticates via WIF (no Workspace reauth wall), so it is the
# repeatable, CI-runnable proof that a brand-new prod instance can serve both
# tabs from the mirrors — run it after a dev-box refresh to confirm the mirror
# is good end-to-end.
on:
  workflow_dispatch:
    inputs:
      verify_only:
        description: "Skip NPW fetches; run only the Cloud Run fresh-instance verification"
        type: boolean
        default: false

env:
  PROJECT_ID: ace-beanbag-486220-a8
  REGION: us-central1
  SERVICE: bank-dashboard
  GCS_BUCKET: ksk-bank-dashboard-data
  SA_EMAIL: bank-dashboard-sa@ace-beanbag-486220-a8.iam.gserviceaccount.com

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Fetch bulk zips from NPW, validate, upload to the GCS mirror
        if: ${{ !inputs.verify_only }}
        run: |
          # NOTE: 403s from GitHub egress (see header) — the dev-box tools are
          # the real refresh path. Only what the two refresh tools' import
          # chains need — not the full requirements.txt.
          python -m pip install --quiet google-cloud-storage pandas requests
          python -m tools.refresh_nic_bulk

      # Latest-quarter FR Y-9C facsimiles for every likely filer. First run
      # of a new quarter fetches ~370 PDFs at 30s spacing (~3h); later
      # runs skip already-mirrored objects and finish in minutes.
      - name: Mirror latest-quarter FR Y-9C facsimile PDFs
        if: ${{ !inputs.verify_only }}
        run: python -m tools.refresh_y9c_mirror

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Prove the PRODUCTION read path end-to-end: run the live service
      # image as a Cloud Run job with a wiped /tmp (a brand-new instance)
      # and require it to serve + parse both bulk files from the mirror
      # just uploaded. Fails this workflow loudly if a fresh prod instance
      # couldn't render the Corporate Structure tab.
      - name: Verify fresh-instance read path (empty /tmp → GCS mirror)
        run: |
          IMAGE=$(gcloud run services describe "${{ env.SERVICE }}" \
            --region="${{ env.REGION }}" \
            --format='value(spec.template.spec.containers[0].image)')
          echo "Verifying with service image: $IMAGE"
          gcloud run jobs deploy nic-mirror-verify \
            --image="$IMAGE" \
            --region="${{ env.REGION }}" \
            --service-account="${{ env.SA_EMAIL }}" \
            --command=python \
            --args=-m,tools.verify_nic_mirror \
            --set-env-vars="GCS_BUCKET=${{ env.GCS_BUCKET }},GCLOUD_PROJECT=${{ env.PROJECT_ID }}" \
            --memory=2Gi \
            --task-timeout=600 \
            --max-retries=0 \
            --quiet
          gcloud run jobs execute nic-mirror-verify \
            --region="${{ env.REGION }}" \
            --wait
