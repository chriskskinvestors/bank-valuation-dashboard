name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy only the latest push to main. Several sessions push within seconds;
# without coordination two `gcloud run deploy`s race the same Cloud Run service
# and one ABORTs with a version conflict (a red "deploy failed" email on a
# change that was actually fine). cancel-in-progress: true cancels older
# in-flight runs so the service is never updated by two deploys at once, and a
# rapid burst collapses to one deploy of the newest commit instead of a queue.
# Trade-off vs serialize (false): intermediate commits in a burst don't get
# their own deploy/smoke — only the newest does.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: true

env:
  PROJECT_ID: ace-beanbag-486220-a8
  REGION: us-central1
  SERVICE: bank-dashboard
  AR_REPO: bank-dashboard
  SQL_INSTANCE: bank-dashboard-db
  SQL_DB: dashboard
  SQL_USER: dashboard
  GCS_BUCKET: ksk-bank-dashboard-data
  SA_EMAIL: bank-dashboard-sa@ace-beanbag-486220-a8.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v6

      # Fail fast, before the ~10 min container build:
      #  1. pyflakes — undefined names anywhere in the app crash pages at
      #     render time (the 2026-06-12 _esc NameError shipped because no
      #     static check ran); seconds to catch here, an outage in prod.
      #  2. render smoke — Home sections rendered with POPULATED fake data
      #     so content-dependent branches actually execute.
      - name: Static analysis + render smoke (pre-build gate)
        run: |
          python -m pip install --quiet pyflakes
          python -m pyflakes app.py ui/ data/ analysis/ jobs/ utils/ \
            | grep -v "imported but unused\|redefinition of unused\|unable to detect undefined names" \
            | tee /tmp/pyflakes.txt || true
          if grep -q "undefined name" /tmp/pyflakes.txt; then
            echo "::error::pyflakes found undefined names — would crash at render time"
            exit 1
          fi
          python -m pip install --quiet -r requirements.txt
          python tests/test_render_smoke.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build container image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          # Use a regional build so logs land in a user-owned regional bucket
          # that the github-deployer service account can read.
          # The default global logs bucket requires Project Viewer/Owner,
          # which we don't (and shouldn't) grant the deployer SA.
          gcloud builds submit \
            --tag "$IMAGE" \
            --region="${{ env.REGION }}" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --quiet
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build secrets-arg (all required — fail the deploy if any is missing)
        id: secrets_arg
        run: |
          # These secrets are REQUIRED. Never conditionally skip one: --set-secrets
          # replaces the whole set, so a silently-dropped secret ships a service
          # missing that key (e.g. blank prices when FMP_API_KEY is absent — the
          # 2026-06-24 outage). If a secret is missing/inaccessible, fail loudly
          # here instead of deploying a half-keyed service.
          SECRETS=""
          MISSING=""
          for s in anthropic-api-key fred-api-key fmp-api-key ffiec-username ffiec-jwt-token; do
            if gcloud secrets describe "$s" --quiet >/dev/null 2>&1; then
              env_var=$(echo "$s" | tr '[:lower:]-' '[:upper:]_')
              SECRETS="${SECRETS:+$SECRETS,}${env_var}=${s}:latest"
            else
              MISSING="${MISSING} ${s}"
            fi
          done
          if [[ -n "$MISSING" ]]; then
            echo "::error::Required secret(s) not accessible — refusing to deploy a half-keyed service:${MISSING}"
            exit 1
          fi
          # OPTIONAL secrets — mounted IF they exist, skipped silently if not (so a
          # deploy never fails on their absence). external-access-password gates
          # non-kskinvestors.com users (ui/access_gate.py); the app runs
          # gate-dormant until the secret is created.
          for s in external-access-password; do
            if gcloud secrets describe "$s" --quiet >/dev/null 2>&1; then
              env_var=$(echo "$s" | tr '[:lower:]-' '[:upper:]_')
              SECRETS="${SECRETS:+$SECRETS,}${env_var}=${s}:latest"
            fi
          done
          echo "secrets=${SECRETS}" >> $GITHUB_OUTPUT

      - name: Build DATABASE_URL
        id: db
        run: |
          INSTANCE_CONN=$(gcloud sql instances describe "${{ env.SQL_INSTANCE }}" --format='value(connectionName)')
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=db-password)
          URL="postgresql+psycopg2://${{ env.SQL_USER }}:${DB_PASSWORD}@/${{ env.SQL_DB }}?host=/cloudsql/${INSTANCE_CONN}"
          # Mask the password in logs
          echo "::add-mask::${DB_PASSWORD}"
          echo "instance_conn=${INSTANCE_CONN}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          ARGS=(
            --image="${{ env.IMAGE }}"
            --region="${{ env.REGION }}"
            --service-account="${{ env.SA_EMAIL }}"
            --add-cloudsql-instances="${{ steps.db.outputs.instance_conn }}"
            --set-env-vars="GCS_BUCKET=${{ env.GCS_BUCKET }},GCLOUD_PROJECT=${{ env.PROJECT_ID }},DATABASE_URL=${{ steps.db.outputs.url }}"
            --memory=4Gi
            --cpu=2
            --cpu-boost
            --min-instances=1
            --max-instances=4
            --concurrency=40
            --timeout=300
            --ingress=internal-and-cloud-load-balancing
            --no-allow-unauthenticated
            --quiet
          )
          if [[ -n "${{ steps.secrets_arg.outputs.secrets }}" ]]; then
            ARGS+=(--set-secrets="${{ steps.secrets_arg.outputs.secrets }}")
          fi
          gcloud run deploy "${{ env.SERVICE }}" "${ARGS[@]}"

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed: $URL"

      # Pre-warm the freshly-deployed (cold) revision: drive a full Home render
      # through IAP so its 60s+ metrics build runs and watchlist_metrics_snap is
      # persisted BEFORE any real user arrives. Without this the first visitor
      # after a deploy hits a cold render where the page paints but native
      # controls aren't wired until the WS session goes live (they look dead).
      # Non-blocking: a warm-up hiccup must never fail a deploy that shipped fine.
      - name: Warm the new revision
        if: vars.LIVE_SMOKE_ENABLED == 'true'
        continue-on-error: true
        env:
          APP_URL: ${{ vars.APP_URL }}
          IAP_CLIENT_ID: ${{ secrets.IAP_CLIENT_ID }}
          SA: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          python -m pip install --quiet playwright mitmproxy
          python -m playwright install --with-deps chromium
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          IAP_TOKEN="$(curl -s -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"audience\":\"${IAP_CLIENT_ID}\",\"includeEmail\":true}" \
            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${SA}:generateIdToken" \
            | python -c 'import sys,json; print(json.load(sys.stdin)["token"])')"
          IAP_TOKEN="$IAP_TOKEN" APP_URL="$APP_URL" python tests/smoke_live.py --warm || true

      # Keep every Cloud Run Job pinned to the just-built image so scheduled
      # jobs (refresh-universe, refresh-sod, poll-events) get the same code
      # the web service is serving. Without this, jobs stay on whatever
      # image they were created with — easy to forget, painful to debug.
      - name: Sync Cloud Run Jobs to deployed image
        run: |
          for job in refresh-universe refresh-sod refresh-ffiec poll-events live-audit refresh-prices refresh-avg-volume refresh-insider refresh-live-yields verify-metrics refresh-capital refresh-company-financials refresh-home-snapshot refresh-macro refresh-premarket refresh-trends; do
            if gcloud run jobs describe "$job" --region="${{ env.REGION }}" --quiet >/dev/null 2>&1; then
              echo "  Updating $job..."
              gcloud run jobs update "$job" \
                --region="${{ env.REGION }}" \
                --image="${{ env.IMAGE }}" \
                --quiet >/dev/null
            else
              echo "  Skipping $job (not deployed yet)"
            fi
          done

      # Self-heal the invoker binding BEFORE verifying it. A newly-created or
      # recreated job loses its IAM policy; rather than red-fail every deploy
      # until someone grants it by hand (refresh-trends did exactly this on
      # 2026-06-24), (re)grant the scheduler-invoker binding here.
      # add-iam-policy-binding is idempotent — a no-op for jobs that already
      # carry it. If the deploy SA lacks setIamPolicy the grant fails softly and
      # the verify gate below still catches the gap loudly (no safety regression).
      - name: Ensure scheduler invoker bindings on scheduled jobs
        run: |
          INVOKER="scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          for job in refresh-universe refresh-sod refresh-ffiec poll-events refresh-prices refresh-home-snapshot verify-metrics refresh-trends refresh-premarket refresh-live-yields refresh-avg-volume refresh-insider refresh-capital refresh-macro; do
            if gcloud run jobs describe "$job" --region="${{ env.REGION }}" --quiet >/dev/null 2>&1; then
              echo "  Ensuring invoker binding on $job..."
              gcloud run jobs add-iam-policy-binding "$job" \
                --region="${{ env.REGION }}" \
                --member="serviceAccount:${INVOKER}" \
                --role="roles/run.invoker" \
                --quiet >/dev/null \
                || echo "    WARN: could not grant on $job (verify step below will flag if still missing)"
            fi
          done

      # A recreated job silently loses its IAM policy, the scheduler gets
      # PERMISSION_DENIED every tick, and data goes stale with no visible
      # failure (refresh-prices was dead 3 days, 2026-06-09..12, found only
      # via a stale on-screen timestamp). Scheduler-triggered jobs MUST
      # carry the invoker binding — fail the deploy loudly if one doesn't.
      # (The Ensure step above normally heals this; this gate stays as the
      # last line of defense if the auto-grant itself was denied.)
      - name: Verify scheduler invoker bindings on scheduled jobs
        run: |
          INVOKER="scheduler-invoker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          missing=""
          for job in refresh-universe refresh-sod refresh-ffiec poll-events refresh-prices refresh-home-snapshot verify-metrics refresh-trends refresh-premarket refresh-live-yields refresh-avg-volume refresh-insider refresh-capital refresh-macro; do
            if gcloud run jobs describe "$job" --region="${{ env.REGION }}" --quiet >/dev/null 2>&1; then
              if ! gcloud run jobs get-iam-policy "$job" --region="${{ env.REGION }}" \
                    --format="value(bindings.members)" 2>/dev/null | grep -q "$INVOKER"; then
                missing="$missing $job"
              fi
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Scheduled job(s) missing the scheduler invoker IAM binding:$missing — their Cloud Scheduler triggers are silently failing with PERMISSION_DENIED. Restore with: gcloud run jobs add-iam-policy-binding <job> --member=serviceAccount:$INVOKER --role=roles/run.invoker --region=${{ env.REGION }}"
            exit 1
          fi
          echo "All scheduled jobs carry the invoker binding."

      # Secret-side twin of the invoker check, but OBSERVE-ONLY for now: a job
      # that silently lost e.g. FMP_API_KEY warms nothing and the cached panes
      # go blank with no error (the 2026-06-24 outage was the service-side
      # version). Reports each job's mounted secrets + warns on a missing
      # expected one; never fails the deploy (continue-on-error) until a clean
      # baseline is established. See ops/report_job_secret_coverage.py.
      - name: Report secret coverage on Cloud Run Jobs (observe-only)
        continue-on-error: true
        run: python ops/report_job_secret_coverage.py

      # Block silent regressions: deploy succeeded but if any ticker no
      # longer resolves to a working data source, fail the workflow so it
      # surfaces in the GitHub UI + CI status. The service still serves
      # the previous green revision until the operator fixes + re-pushes.
      - name: Verify coverage (every ticker has at least one data source)
        run: |
          python -m pip install --quiet -r requirements.txt
          python tests/test_universe_coverage.py

  # Gap A (production-readiness audit) — post-deploy LIVE smoke check.
  # Drives the deployed IAP-gated page with a headless browser and asserts it
  # actually renders (no traceback in the DOM) — catching render failures the
  # health probe can't see. STAYS OFF until configured, so it can never break a
  # deploy prematurely. To enable, set these on the repo:
  #   - variable  LIVE_SMOKE_ENABLED = true
  #   - variable  APP_URL            = https://<the IAP/public dashboard URL>
  #   - secret    IAP_CLIENT_ID      = the IAP OAuth 2.0 client ID
  # and grant the deployer SA IAP access + ID-token minting (one time):
  #   gcloud iap web add-iam-policy-binding \
  #     --resource-type=backend-services --service=<backend-service> \
  #     --member=serviceAccount:github-deployer@ace-beanbag-486220-a8.iam.gserviceaccount.com \
  #     --role=roles/iap.httpsResourceAccessor
  #   gcloud iam service-accounts add-iam-policy-binding \
  #     github-deployer@ace-beanbag-486220-a8.iam.gserviceaccount.com \
  #     --member=serviceAccount:github-deployer@ace-beanbag-486220-a8.iam.gserviceaccount.com \
  #     --role=roles/iam.serviceAccountOpenIdTokenCreator
  smoke:
    needs: deploy
    if: vars.LIVE_SMOKE_ENABLED == 'true'
    runs-on: ubuntu-latest
    # Observe-only (reverted from blocking 2026-06-17). It WAS flipped to blocking
    # after two green runs, but then false-failed a deploy that shipped fine
    # (run on 2c39d9d: deploy succeeded, smoke flaked) — reddening a good deploy
    # and emailing a failure. Two greens wasn't enough proof, especially under the
    # concurrent-deploy load that can leave the page mid-revision-swap when smoked.
    # Keep it surfacing the signal without failing the deploy; re-evaluate blocking
    # only after a long stretch of green now that deploys are serialized.
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      - name: Install Playwright (chromium) + mitmproxy
        run: |
          python -m pip install --quiet playwright mitmproxy
          python -m playwright install --with-deps chromium
          # Pre-generate mitmproxy's CA so the first proxied request isn't racing
          # CA creation (smoke_live.py routes the browser through mitmdump to
          # attach the IAP token to the WebSocket upgrade Chromium won't header).
          timeout 10 mitmdump -q -p 8898 >/dev/null 2>&1 || true
      - name: Live smoke through IAP
        env:
          APP_URL: ${{ vars.APP_URL }}
          IAP_CLIENT_ID: ${{ secrets.IAP_CLIENT_ID }}
          SA: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          # Under Workload Identity Federation the active credential isn't a SA key,
          # so `gcloud auth print-identity-token --audiences` is rejected. Mint the
          # IAP-audience OIDC token via the IAM Credentials API instead (the SA holds
          # roles/iam.serviceAccountOpenIdTokenCreator on itself).
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          IAP_TOKEN="$(curl -s -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"audience\":\"${IAP_CLIENT_ID}\",\"includeEmail\":true}" \
            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${SA}:generateIdToken" \
            | python -c 'import sys,json; print(json.load(sys.stdin)["token"])')"
          if [ -z "$IAP_TOKEN" ]; then echo "::error::failed to mint IAP token"; exit 1; fi
          IAP_TOKEN="$IAP_TOKEN" APP_URL="$APP_URL" python tests/smoke_live.py
